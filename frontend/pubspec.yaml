name: music_player_app
description: "Music player app that connects to server for metadata enrichment"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # UI Icons
  cupertino_icons: ^1.0.8

  # Audio Playback
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # HTTP Client for API calls
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # Secure Storage for tokens
  flutter_secure_storage: ^9.2.2

  # File System
  path_provider: ^2.1.5
  file_picker: ^8.1.4

  # Permissions
  permission_handler: ^11.3.1

  # Metadata extraction from audio files
  audio_metadata_reader: ^1.2.1

  # Image caching
  cached_network_image: ^3.4.1

  # Navigation
  go_router: ^14.6.2

  # JSON serialization
  json_annotation: ^4.9.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Utilities
  intl: ^0.20.1
  url_launcher: ^6.3.1

  # Cryptography for file hashing
  crypto: ^3.0.3

  # Path manipulation
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - .env

  # Fonts (optional)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700
